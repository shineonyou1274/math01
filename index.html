<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>분수의 덧셈·뺄셈, 한 단계씩</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root{
    --paper:#EEF2F7; --card:#FFFFFF; --ink:#1F2733; --ink-soft:#5C6878;
    --line:#D8E0EA; --progress:#0E9E84; --progress-soft:#E0F4EF;
    --active:#EE8326; --active-soft:#FCEBD9; --hint:#DF4F37; --hint-soft:#FBE7E2;
    --locked:#A9B3C0; --elem:#3B82C4; --mid:#7C5CD6;
    --shadow:0 1px 2px rgba(31,39,51,.04), 0 10px 28px rgba(31,39,51,.07);
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Pretendard',system-ui,sans-serif;background:var(--paper);
    color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;font-variant-numeric:tabular-nums;}
  .wrap{max-width:700px;margin:0 auto;padding:26px 16px 80px;}

  header h1{font-size:1.5rem;font-weight:800;letter-spacing:-.02em;margin:0 0 4px;}
  header p{margin:0;color:var(--ink-soft);font-size:.92rem;}

  .toolbar{display:flex;flex-wrap:wrap;gap:10px;margin:18px 0 14px;}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff;box-shadow:var(--shadow);}
  .seg .lbl{align-self:center;padding:0 12px 0 14px;font-size:.78rem;font-weight:700;color:var(--ink-soft);}
  .seg button{font-family:inherit;font-size:.88rem;font-weight:700;border:0;background:#fff;color:var(--ink-soft);padding:11px 16px;cursor:pointer;}
  .seg button[aria-pressed="true"]{color:#fff;}
  #lvElem[aria-pressed="true"]{background:var(--elem);}
  #lvMid[aria-pressed="true"]{background:var(--mid);}
  #mLcm[aria-pressed="true"],#mProd[aria-pressed="true"]{background:var(--ink);}
  .seg button:focus-visible{outline:3px solid var(--active-soft);outline-offset:-3px;}

  .qbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:var(--card);border:1px solid var(--line);
    border-radius:14px;box-shadow:var(--shadow);padding:12px 16px;}
  .counter{font-weight:800;font-size:1.05rem;}
  .score{color:var(--ink-soft);font-size:.85rem;font-weight:600;}
  .qbar .spacer{flex:1;}
  .btn{font-family:inherit;font-size:.85rem;font-weight:700;border:1px solid var(--line);background:#fff;color:var(--ink);
    border-radius:10px;padding:9px 14px;cursor:pointer;}
  .btn:hover{border-color:var(--active);color:var(--active);}
  .btn:focus-visible{outline:3px solid var(--active-soft);}
  .btn.primary{background:var(--active);border-color:var(--active);color:#fff;}
  .btn.primary:hover{filter:brightness(.97);color:#fff;}

  .manual{display:none;background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);
    padding:14px 16px;margin-top:10px;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;}
  .manual.show{display:flex;}
  .manual input{width:54px;height:42px;text-align:center;font-size:1.2rem;font-weight:700;font-family:inherit;
    border:2px solid var(--line);border-radius:9px;}
  .manual select{font-family:inherit;font-size:1.3rem;font-weight:700;border:2px solid var(--line);border-radius:9px;padding:6px;}
  .manual .mfrac{display:inline-flex;flex-direction:column;align-items:center;gap:3px;}
  .manual .mfrac .bar{width:56px;height:3px;background:var(--ink);border-radius:2px;}

  .qshow{display:flex;align-items:center;justify-content:center;gap:18px;margin:18px 0 4px;font-weight:800;}
  .bigfrac{display:inline-flex;flex-direction:column;align-items:center;line-height:1;}
  .bigfrac .top,.bigfrac .bot{font-size:2rem;padding:0 4px;}
  .bigfrac .bar{height:3px;background:var(--ink);border-radius:2px;width:100%;min-width:42px;margin:4px 0;}
  .qshow .op{font-size:2rem;}

  .step{position:relative;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 18px 18px;
    margin-top:14px;box-shadow:var(--shadow);transition:border-color .2s,opacity .2s;}
  .step[data-state="locked"]{opacity:.45;}
  .step[data-state="active"]{border-color:var(--active);box-shadow:0 0 0 3px var(--active-soft),var(--shadow);}
  .step[data-state="done"]{border-color:var(--progress);}
  .step-head{display:flex;align-items:center;gap:10px;}
  .badge{flex:none;width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-weight:800;background:var(--paper);color:var(--locked);}
  .step[data-state="active"] .badge{background:var(--active-soft);color:var(--active);}
  .step[data-state="done"] .badge{background:var(--progress);color:#fff;}
  .step-title{font-weight:800;font-size:1.02rem;}
  .check{margin-left:auto;font-weight:800;color:var(--progress);display:none;}
  .step[data-state="done"] .check{display:inline;}
  .step-sub{margin:6px 0 0 40px;color:var(--ink-soft);font-size:.86rem;}
  .step-body{margin:12px 0 0 40px;}
  .feedback{margin:10px 0 0 40px;font-size:.86rem;font-weight:700;min-height:1.2em;}
  .feedback.bad{color:var(--hint);} .feedback.good{color:var(--progress);}

  .ibox{width:78px;height:50px;text-align:center;font-size:1.4rem;font-weight:800;font-family:inherit;
    border:2px solid var(--line);border-radius:11px;background:#fff;}
  .ibox:focus-visible{outline:none;border-color:var(--active);box-shadow:0 0 0 3px var(--active-soft);}
  .ilabel{display:block;font-size:.72rem;font-weight:700;color:var(--ink-soft);text-align:center;margin-bottom:3px;}
  .row{display:flex;flex-wrap:wrap;align-items:flex-end;gap:14px;}
  .verify{font-family:inherit;font-size:.88rem;font-weight:800;color:#fff;background:var(--active);border:0;border-radius:11px;padding:11px 20px;cursor:pointer;align-self:center;}
  .verify:hover{filter:brightness(.97);} .verify:focus-visible{outline:3px solid var(--active-soft);}

  .tcard{display:grid;grid-template-columns:auto auto auto;grid-template-rows:auto auto auto;align-items:center;
    gap:2px 14px;justify-content:start;background:var(--paper);border-radius:14px;padding:14px 18px;margin-bottom:10px;}
  .tcard .num,.tcard .den{font-size:1.55rem;font-weight:800;text-align:center;min-width:46px;}
  .tcard .fbar{height:3px;background:var(--ink);border-radius:2px;}
  .tcard .mul{font-size:.95rem;font-weight:800;color:var(--progress);text-align:center;}
  .tcard .arr{display:grid;place-items:center;color:var(--ink-soft);}
  .tcard input{width:64px;height:46px;text-align:center;font-size:1.45rem;font-weight:800;font-family:inherit;
    border:2px solid var(--active);border-radius:10px;background:#fff;color:var(--ink);}
  .tcard input:focus-visible{outline:none;box-shadow:0 0 0 3px var(--active-soft);}
  .thint{margin:0 0 14px;font-size:.84rem;color:var(--ink-soft);font-weight:600;}
  .thint b{color:var(--ink);}

  .resfrac{display:inline-flex;flex-direction:column;align-items:center;gap:3px;}
  .resfrac .bar{width:100%;min-width:64px;height:3px;background:var(--ink);border-radius:2px;}
  .resfrac .fixed{font-size:1.4rem;font-weight:800;}

  .arrow{display:flex;justify-content:center;height:24px;align-items:center;color:var(--locked);}
  .arrow.live{color:var(--active);}
  .arrow.live svg{animation:nudge 1.1s ease-in-out infinite;}
  @keyframes nudge{0%,100%{transform:translateY(-2px);}50%{transform:translateY(3px);}}

  .done-banner{display:none;margin-top:16px;background:var(--progress-soft);border:1px solid var(--progress);
    border-radius:16px;padding:16px 18px;text-align:center;}
  .done-banner.show{display:block;}
  .done-banner .eq{font-size:1.3rem;font-weight:800;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;}
  .mini{display:inline-flex;flex-direction:column;align-items:center;line-height:1.05;}
  .mini .bar{width:100%;height:2px;background:currentColor;margin:1px 0;}
  .done-banner .next{margin-top:12px;}

  @media (max-width:430px){
    .bigfrac .top,.bigfrac .bot,.qshow .op{font-size:1.7rem;}
    .step-body,.step-sub,.feedback{margin-left:0;}
    .tcard{padding:12px;gap:2px 10px;}
    .tcard .num,.tcard .den{font-size:1.35rem;}
  }
  @media (prefers-reduced-motion:reduce){.arrow.live svg{animation:none;} *{transition:none !important;}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>분수의 덧셈·뺄셈, 한 단계씩</h1>
    <p>한 칸씩 답을 넣으면 다음 단계로 안내해요. 막히면 그 자리에서 힌트를 줍니다.</p>
  </header>

  <div class="toolbar">
    <div class="seg" role="group" aria-label="수준">
      <span class="lbl">수준</span>
      <button id="lvElem" aria-pressed="true">초등</button>
      <button id="lvMid" aria-pressed="false">중등</button>
    </div>
    <div class="seg" role="group" aria-label="통분 방법">
      <span class="lbl">통분</span>
      <button id="mLcm" aria-pressed="true">최소공배수</button>
      <button id="mProd" aria-pressed="false">분모곱</button>
    </div>
  </div>

  <p id="levelHint" style="margin:-2px 0 14px;color:var(--ink-soft);font-size:.82rem;font-weight:600;"></p>

  <div class="qbar">
    <span class="counter" id="counter">문제 1 / 10</span>
    <span class="score" id="score">맞힌 문제 0</span>
    <span class="spacer"></span>
    <button class="btn" id="manualBtn">직접 입력</button>
    <button class="btn" id="newSet">새 세트</button>
    <button class="btn primary" id="nextBtn">다음 문제 →</button>
  </div>

  <div class="manual" id="manual">
    <div class="mfrac"><input id="mn1" inputmode="numeric" aria-label="분자1" value="1"/><div class="bar"></div><input id="md1" inputmode="numeric" aria-label="분모1" value="2"/></div>
    <select id="mop" aria-label="연산"><option>+</option><option>−</option></select>
    <div class="mfrac"><input id="mn2" inputmode="numeric" aria-label="분자2" value="1"/><div class="bar"></div><input id="md2" inputmode="numeric" aria-label="분모2" value="3"/></div>
    <button class="btn primary" id="mGo">이 문제로</button>
  </div>

  <div class="qshow" id="qshow"></div>
  <div class="trail" id="trail" aria-live="polite"></div>

  <div class="done-banner" id="doneBanner" role="status">
    <div class="eq" id="doneEq"></div>
    <button class="btn primary next" id="bannerNext">다음 문제 →</button>
  </div>
</div>

<script>
(function(){
  "use strict";
  const $ = id => document.getElementById(id);
  const gcd=(a,b)=>{a=Math.abs(a);b=Math.abs(b);while(b){[a,b]=[b,a%b];}return a||1;};
  const lcm=(a,b)=>Math.abs(a*b)/gcd(a,b);
  function reduce(num,den){if(den<0){num=-num;den=-den;}if(num===0)return[0,1];const g=gcd(num,den);return[num/g,den/g];}
  const pint=v=>{const n=parseInt(v,10);return Number.isFinite(n)?n:NaN;};
  const rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;

  let level='elem', method='lcm';
  let set=[], qi=0, score=0, solvedThis=false, m=null;

  function genProblem(){
    let d1=rnd(2,12), d2=rnd(2,12);
    while(d2===d1) d2=rnd(2,12);
    let n1=rnd(1,d1-1), n2=rnd(1,d2-1);
    let op=Math.random()<0.5?'+':'-';
    if(level==='elem'){
      // 초등: 양의 분수만, 뺄셈 결과가 음수가 되지 않도록 큰 분수를 앞에 둠
      if(op==='-' && n1*d2 < n2*d1){ [n1,d1,n2,d2]=[n2,d2,n1,d1]; }
    } else {
      // 중등: 유리수 — 분자에 음수 부호가 붙을 수 있고 결과도 음수 가능
      if(Math.random()<0.55) n1=-n1;
      if(Math.random()<0.55) n2=-n2;
    }
    return {n1,d1,n2,d2,op};
  }
  function newSet(){ set=Array.from({length:10},genProblem); qi=0; score=0; loadQuestion(); }
  function nextQuestion(){ if(qi<set.length-1){qi++;} else {set.push(genProblem());qi++;} loadQuestion(); }

  function compute(p){
    let {n1,d1,n2,d2,op}=p;
    if(d1<0){n1=-n1;d1=-d1;} if(d2<0){n2=-n2;d2=-d2;}
    const common=method==='lcm'?lcm(d1,d2):d1*d2;
    const f1=common/d1,f2=common/d2,new1=n1*f1,new2=n2*f2;
    const resNum=op==='+'?new1+new2:new1-new2;
    const [rNum,rDen]=reduce(resNum,common);
    return {n1,d1,n2,d2,op,common,f1,f2,new1,new2,resNum,resDen:common,rNum,rDen};
  }

  function bigfrac(n,d){return `<span class="bigfrac"><span class="top">${n}</span><span class="bar"></span><span class="bot">${d}</span></span>`;}

  function loadQuestion(){
    m=compute(set[qi]); solvedThis=false;
    $('counter').textContent=`문제 ${qi+1} / ${set.length}`;
    $('score').textContent=`맞힌 문제 ${score}`;
    $('doneBanner').classList.remove('show');
    $('qshow').innerHTML = `${bigfrac(m.n1,m.d1)}<span class="op">${m.op==='+'?'+':'−'}</span>${bigfrac(m.n2,m.d2)}<span class="op">=</span><span class="bigfrac"><span class="top" style="color:var(--locked)">?</span><span class="bar" style="background:var(--locked)"></span><span class="bot" style="color:var(--locked)">?</span></span>`;
    renderSteps();
  }

  function arrowEl(){return `<div class="arrow"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M6 13l6 6 6-6"/></svg></div>`;}

  function tcard(n,d,factor,common,inpId){
    return `<div class="tcard">
      <div class="num">${n}</div><div class="mul">×${factor}</div><div class="num"><input id="${inpId}" inputmode="numeric" aria-label="통분한 분자"/></div>
      <div class="fbar"></div><div class="arr"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></div><div class="fbar"></div>
      <div class="den">${d}</div><div class="mul">×${factor}</div><div class="den">${common}</div>
    </div>
    <p class="thint">분모 <b>${d} → ${common}</b> 이 되려면 위아래에 <b>${factor}</b>를 곱해요. &nbsp;분자: <b>${n} × ${factor} = ?</b></p>`;
  }

  function renderSteps(){
    const methodLabel = method==='lcm'?'두 분모의 최소공배수':'두 분모의 곱';
    $('trail').innerHTML = `
      <div class="step" id="s0" data-state="active">
        <div class="step-head"><div class="badge">1</div><div class="step-title">공통분모 정하기</div><span class="check">완료 ✓</span></div>
        <p class="step-sub">${methodLabel}으로 분모를 같게 만들어요. (분모: ${m.d1}, ${m.d2})</p>
        <div class="step-body"><div class="row">
          <div><span class="ilabel">공통분모</span><input id="i0" class="ibox" inputmode="numeric" aria-label="공통분모"/></div>
          <button class="verify" data-step="0">확인</button>
        </div></div>
        <div class="feedback" id="f0"></div>
      </div>
      ${arrowEl()}
      <div class="step" id="s1" data-state="locked">
        <div class="step-head"><div class="badge">2</div><div class="step-title">통분하기 — 위아래에 같은 수 곱하기</div><span class="check">완료 ✓</span></div>
        <p class="step-sub">분수의 값은 그대로 두고, 분모만 공통분모로 바꿔요.</p>
        <div class="step-body" id="tbody"></div>
        <div class="row" style="margin:4px 0 0 40px"><button class="verify" data-step="1">확인</button></div>
        <div class="feedback" id="f1"></div>
      </div>
      ${arrowEl()}
      <div class="step" id="s2" data-state="locked">
        <div class="step-head"><div class="badge">3</div><div class="step-title">분자끼리 계산</div><span class="check">완료 ✓</span></div>
        <p class="step-sub">분모는 그대로 두고 분자만 ${m.op==='+'?'더해요':'빼요'}.</p>
        <div class="step-body"><div class="row">
          <span class="resfrac"><input id="i2" class="ibox" inputmode="numeric" aria-label="계산한 분자"/><span class="bar"></span><span class="fixed" id="cd3">?</span></span>
          <button class="verify" data-step="2">확인</button>
        </div></div>
        <div class="feedback" id="f2"></div>
      </div>
      ${arrowEl()}
      <div class="step" id="s3" data-state="locked">
        <div class="step-head"><div class="badge">4</div><div class="step-title">기약분수로</div><span class="check">완료 ✓</span></div>
        <p class="step-sub">분자와 분모를 최대공약수로 약분해요. 더 나눌 수 없으면 그대로 쓰면 돼요.</p>
        <div class="step-body"><div class="row">
          <span class="resfrac"><input id="i3n" class="ibox" inputmode="numeric" aria-label="기약분수 분자"/><span class="bar"></span><input id="i3d" class="ibox" inputmode="numeric" aria-label="기약분수 분모"/></span>
          <button class="verify" data-step="3">확인</button>
        </div></div>
        <div class="feedback" id="f3"></div>
      </div>`;
    $('trail').querySelectorAll('.verify').forEach(b=>b.addEventListener('click',()=>verify(+b.dataset.step)));
    $('trail').querySelectorAll('input').forEach(inp=>inp.addEventListener('keydown',e=>{
      if(e.key==='Enter'){const st=inp.closest('.step');const idx=['s0','s1','s2','s3'].indexOf(st.id);if(idx>=0)verify(idx);}
    }));
    setTimeout(()=>{const i=$('i0');if(i)i.focus();},40);
  }

  const setState=(i,s)=>{const el=$('s'+i);if(el)el.dataset.state=s;};
  function liveArrow(i){document.querySelectorAll('.arrow').forEach(a=>a.classList.remove('live'));const a=document.querySelectorAll('.arrow')[i];if(a)a.classList.add('live');}
  const fb=(i,msg,kind)=>{const f=$('f'+i);if(f){f.textContent=msg||'';f.className='feedback'+(kind?(' '+kind):'');}};

  function verify(i){
    if(i===0){
      const v=pint($('i0').value);
      const target=method==='lcm'?lcm(m.d1,m.d2):m.d1*m.d2;
      if(Number.isNaN(v)){fb(0,'공통분모에 들어갈 수를 적어 주세요.','bad');return;}
      if(v===target){
        setState(0,'done');setState(1,'active');liveArrow(1);fb(0,'');
        $('tbody').innerHTML = tcard(m.n1,m.d1,m.f1,m.common,'i1a') + tcard(m.n2,m.d2,m.f2,m.common,'i1b');
        $('tbody').querySelectorAll('input').forEach(inp=>inp.addEventListener('keydown',e=>{if(e.key==='Enter')verify(1);}));
        const t=$('i1a');if(t)t.focus();
        return;
      }
      const okOther = (method==='lcm' && v===m.d1*m.d2) || (method==='prod' && v===lcm(m.d1,m.d2));
      if(okOther){fb(0,`그 수도 공통분모예요. 지금 화면은 ${method==='lcm'?'최소공배수':'분모곱'}(${target})로 맞춰져 있어요.`,'bad');return;}
      if(v>0 && v%m.d1===0 && v%m.d2===0){fb(0,`공통분모이긴 해요. 지금은 ${target}로 맞춰 볼까요?`,'bad');return;}
      fb(0,`아직 공통분모가 아니에요. ${m.d1}와 ${m.d2}로 모두 나누어떨어지는 수를 찾아 보세요.`,'bad');
    }
    else if(i===1){
      const a=pint($('i1a').value), b=pint($('i1b').value);
      if(Number.isNaN(a)||Number.isNaN(b)){fb(1,'두 분자를 모두 채워 주세요.','bad');return;}
      if(a!==m.new1){fb(1,`첫째 분수: ${m.n1} × ${m.f1} 를 계산해 보세요.`,'bad');return;}
      if(b!==m.new2){fb(1,`둘째 분수: ${m.n2} × ${m.f2} 를 계산해 보세요.`,'bad');return;}
      setState(1,'done');setState(2,'active');liveArrow(2);fb(1,'');
      $('cd3').textContent=m.common;const t=$('i2');if(t)t.focus();
    }
    else if(i===2){
      const v=pint($('i2').value);
      if(Number.isNaN(v)){fb(2,'계산한 분자를 적어 주세요.','bad');return;}
      if(v!==m.resNum){fb(2,`분자끼리 ${m.op==='+'?'더해':'빼'} 볼까요? ${m.new1} ${m.op==='+'?'+':'−'} ${m.new2}`,'bad');return;}
      setState(2,'done');setState(3,'active');liveArrow(3);fb(2,'');
      const t=$('i3n');if(t)t.focus();
    }
    else if(i===3){
      const num=pint($('i3n').value), den=pint($('i3d').value);
      if(Number.isNaN(num)||Number.isNaN(den)){fb(3,'기약분수의 분자와 분모를 모두 적어 주세요.','bad');return;}
      if(den===0){fb(3,'분모는 0이 될 수 없어요.','bad');return;}
      const [un,ud]=reduce(num,den);
      if(un===m.rNum && ud===m.rDen){
        setState(3,'done');liveArrow(-1);fb(3,'');
        if(!solvedThis){solvedThis=true;score++;$('score').textContent=`맞힌 문제 ${score}`;}
        showDone();
      } else if(un*m.rDen===m.rNum*ud){
        fb(3,'값은 맞아요! 더 약분할 수 있어요. 분자·분모를 최대공약수로 한 번 더 나눠 보세요.','bad');
      } else {
        fb(3,`아직이에요. 3단계 결과 ${m.resNum}/${m.resDen} 를 약분해 보세요.`,'bad');
      }
    }
  }

  function showDone(){
    const opSym=m.op==='+'?'+':'−';
    const mf=(n,d)=>`<span class="mini"><span>${n}</span><span class="bar"></span><span>${d}</span></span>`;
    const res = m.rDen===1?`<span>${m.rNum}</span>`:mf(m.rNum,m.rDen);
    $('doneEq').innerHTML=`${mf(m.n1,m.d1)} <span>${opSym}</span> ${mf(m.n2,m.d2)} <span>=</span> ${res}`;
    $('doneBanner').classList.add('show');
  }

  function updateHint(){ $('levelHint').textContent = level==='elem'
    ? '초등 · 양의 분수만 나와요. 뺄셈도 결과가 0 이상이에요.'
    : '중등 · 음수(유리수)가 섞여 나오고, 결과가 음수일 수 있어요.'; }
  function setLevel(lv){level=lv;$('lvElem').setAttribute('aria-pressed',lv==='elem');$('lvMid').setAttribute('aria-pressed',lv==='mid');updateHint();newSet();}
  function setMethod(mt){method=mt;$('mLcm').setAttribute('aria-pressed',mt==='lcm');$('mProd').setAttribute('aria-pressed',mt==='prod');loadQuestion();}
  $('lvElem').addEventListener('click',()=>setLevel('elem'));
  $('lvMid').addEventListener('click',()=>setLevel('mid'));
  $('mLcm').addEventListener('click',()=>setMethod('lcm'));
  $('mProd').addEventListener('click',()=>setMethod('prod'));
  $('newSet').addEventListener('click',newSet);
  $('nextBtn').addEventListener('click',nextQuestion);
  $('bannerNext').addEventListener('click',nextQuestion);
  $('manualBtn').addEventListener('click',()=>$('manual').classList.toggle('show'));
  $('mGo').addEventListener('click',()=>{
    const n1=pint($('mn1').value),d1=pint($('md1').value),n2=pint($('mn2').value),d2=pint($('md2').value);
    const op=$('mop').value==='+'?'+':'-';
    if([n1,d1,n2,d2].some(Number.isNaN)||d1===0||d2===0){alert('분자·분모를 확인해 주세요. 분모는 0이 될 수 없어요.');return;}
    set[qi]={n1,d1,n2,d2,op};loadQuestion();
  });

  updateHint();
  newSet();
})();
</script>
</body>
</html>
